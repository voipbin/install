apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - network-policies
  - infrastructure
  - database
  - voip
  - backend
  - frontend

# Image rendering policy (PR-AD): self-hosted opensource operators default to
# :latest tracking monorepo CI. To pin a SHA, change `newTag` per entry — see
# docs/operations/image-overrides.md for the recipe and known limitations.
images:

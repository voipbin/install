apiVersion: v1
kind: Secret
metadata:
  name: voipbin
  namespace: bin-manager
type: Opaque
stringData:
  AUTHTOKEN_MESSAGEBIRD: "dummy-messagebird-token"
  AUTHTOKEN_TELNYX: "dummy-telnyx-authtoken"
  AWS_ACCESS_KEY: "dummy-aws-access-key"
  AWS_SECRET_KEY: "dummy-aws-secret-key"
  CARTESIA_API_KEY: "dummy-cartesia-key"
  CLICKHOUSE_ADDRESS: "clickhouse.infrastructure.svc.cluster.local:9000"
  CLICKHOUSE_DATABASE: "default"
  DATABASE_DSN_ASTERISK: "asterisk:dummy-password@tcp(PLACEHOLDER_CLOUDSQL_PRIVATE_IP:3306)/asterisk"
  DATABASE_DSN_BIN: "bin-manager:dummy-password@tcp(PLACEHOLDER_CLOUDSQL_PRIVATE_IP:3306)/bin_manager"
  DATABASE_DSN_POSTGRES: "postgres://bin-manager:dummy-password@PLACEHOLDER_CLOUDSQL_PRIVATE_IP:5432/bin_manager?sslmode=disable"
  DEEPGRAM_API_KEY: "dummy-deepgram-key"
  DOMAIN_NAME_EXTENSION: "registrar.PLACEHOLDER_DOMAIN"
  DOMAIN_NAME_TRUNK: "trunk.PLACEHOLDER_DOMAIN"
  ELEVENLABS_API_KEY: "dummy-elevenlabs-key"
  ENGINE_KEY_CHATGPT: "dummy-openai-engine-key"
  EXTERNAL_SIP_GATEWAY_ADDRESSES: ""
  GCP_BUCKET_NAME_MEDIA: "PLACEHOLDER_PROJECT_ID-voipbin-media"
  GCP_BUCKET_NAME_TMP: "PLACEHOLDER_PROJECT_ID-voipbin-tmp"
  GCP_PROJECT_ID: "PLACEHOLDER_PROJECT_ID"
  GCP_PROJECT_NAME: "PLACEHOLDER_PROJECT_ID"
  GCP_REGION: "PLACEHOLDER_REGION"
  GOOGLE_API_KEY: "dummy-google-api-key"
  HOMER_API_ADDRESS: "http://homer.local"
  HOMER_AUTH_TOKEN: "dummy-homer-token"
  HOMER_WHITELIST: ""
  JWT_KEY: "PLACEHOLDER_JWT_KEY"
  MAILGUN_API_KEY: "dummy-mailgun-key"
  OPENAI_API_KEY: "dummy-openai-key"
  PADDLE_API_KEY: "dummy-paddle-key"
  PADDLE_PRICE_ID_BASIC: ""
  PADDLE_PRICE_ID_PROFESSIONAL: ""
  PADDLE_WEBHOOK_SECRET_KEY: "dummy-paddle-webhook-secret"

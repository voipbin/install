  PROJECT_BUCKET_NAME: "PLACEHOLDER_PROJECT_ID-voipbin-media"
  PROMETHEUS_ENDPOINT: "/metrics"
  PROMETHEUS_LISTEN_ADDRESS: ":2112"
  RABBITMQ_ADDRESS: "amqp://guest:***@rabbitmq.infrastructure.svc.cluster.local:5672"
  REDIS_ADDRESS: "redis.infrastructure.svc.cluster.local:6379"
  REDIS_DATABASE: "1"
  REDIS_PASSWORD: ""
  SENDGRID_API_KEY: "dummy-sendgrid-key"
  SSL_CERT_API_BASE64: "PLACEHOLDER_SSL_CERT_API_BASE64"
  SSL_CERT_HOOK_BASE64: "PLACEHOLDER_SSL_CERT_HOOK_BASE64"
  SSL_PRIVKEY_API_BASE64: "PLACEHOLDER_SSL_PRIVKEY_API_BASE64"
  SSL_PRIVKEY_HOOK_BASE64: "PLACEHOLDER_SSL_PRIVKEY_HOOK_BASE64"
  STREAMING_LISTEN_PORT: "8080"
  STT_PROVIDER_PRIORITY: "GCP,AWS"
  TELNYX_CONNECTION_ID: ""
  TELNYX_PROFILE_ID: ""
  TELNYX_TOKEN: "dummy-telnyx-token"
  TWILIO_SID: "dummy-twilio-sid"
  TWILIO_TOKEN: "dummy-twilio-token"
  XAI_API_KEY: "dummy-xai-key"

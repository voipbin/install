apiVersion: apps/v1
kind: Deployment
metadata:
  name: hook-manager
  namespace: bin-manager
  labels:
    app: hook-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hook-manager
  template:
    metadata:
      labels:
        app: hook-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: hook-manager
          image: voipbin/hook-manager
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
            - containerPort: 2112
              name: metrics
          envFrom:
            - configMapRef:
                name: voipbin-config
            - secretRef:
                name: voipbin-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hook-manager
  namespace: bin-manager
  labels:
    app: hook-manager
spec:
  type: LoadBalancer
  loadBalancerIP: PLACEHOLDER_STATIC_IP_ADDRESS_HOOK_MANAGER
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
  selector:
    app: hook-manager
  # PR #3b: metrics (2112) is intentionally NOT exposed via this LB.
  # Prometheus reaches it via Pod-IP scrape (kubelet annotations).
  # externalTrafficPolicy: Local preserves client IP for webhook
  # provider audit/allowlisting. Requires healthCheckNodePort, which
  # GCP allocates automatically (counted in preflight needed=7).
  # replicas: 2 + PodDisruptionBudget(minAvailable=1) eliminates the
  # single-Pod node-drain footgun inherent to externalTrafficPolicy: Local.

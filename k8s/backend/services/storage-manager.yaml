apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-manager
  namespace: bin-manager
  labels:
    app: storage-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-manager
  template:
    metadata:
      labels:
        app: storage-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: storage-manager
          image: voipbin/storage-manager
          ports:
            - containerPort: 2112
              name: metrics
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_PROJECT_ID
            - name: GCP_BUCKET_NAME_TMP
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_BUCKET_NAME_TMP
            - name: GCP_BUCKET_NAME_MEDIA
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_BUCKET_NAME_MEDIA
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: JWT_KEY
            - name: CLICKHOUSE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: CLICKHOUSE_ADDRESS
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: storage-manager
  namespace: bin-manager
  labels:
    app: storage-manager
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
  selector:
    app: storage-manager

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-manager
  namespace: bin-manager
  labels:
    app: rag-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-manager
  template:
    metadata:
      labels:
        app: rag-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: rag-manager
          image: rag-manager-image
          imagePullPolicy: Always
          ports:
            - containerPort: 2112
              name: metrics
          env:
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_PROJECT_ID
            - name: GCP_REGION
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_REGION
            - name: POSTGRESQL_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_POSTGRES
            - name: GOOGLE_EMBEDDING_MODEL
              value: "text-embedding-004"
            - name: RAG_TOP_K
              value: "5"
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-manager
  namespace: bin-manager
  labels:
    app: rag-manager
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
  selector:
    app: rag-manager

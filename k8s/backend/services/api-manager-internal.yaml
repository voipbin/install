apiVersion: v1
kind: Service
metadata:
  name: api-manager-internal
  namespace: bin-manager
  labels:
    app: api-manager
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
    - name: audiosocket
      port: 9000
      targetPort: 9000
  selector:
    app: api-manager
  # PR #3b: in-cluster-only endpoints for ports stripped from the
  # external api-manager LB in PR #3a. Forward-looking: Prometheus
  # (PR #4) and monorepo Asterisk audiosocket dial address will
  # target api-manager-internal.bin-manager.svc.cluster.local.

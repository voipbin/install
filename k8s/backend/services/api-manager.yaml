apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-manager
  namespace: bin-manager
  labels:
    app: api-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-manager
  template:
    metadata:
      labels:
        app: api-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: api-manager
          image: api-manager-image
          imagePullPolicy: Always
          ports:
            - containerPort: 2112
              name: metrics
            - containerPort: 443
              name: service
            - containerPort: 9000
              name: audiosocket
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: DATABASE_DSN_BIN
            - name: RABBITMQ_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: RABBITMQ_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_ADDRESS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_PASSWORD
            - name: REDIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: REDIS_DATABASE
            - name: SSL_PRIVKEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: SSL_PRIVKEY_API_BASE64
            - name: SSL_CERT_BASE64
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: SSL_CERT_API_BASE64
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_PROJECT_ID
            - name: GCP_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: GCP_BUCKET_NAME_TMP
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: voipbin
                  key: JWT_KEY
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PROMETHEUS_ENDPOINT
              value: "/metrics"
            - name: PROMETHEUS_LISTEN_ADDRESS
              value: ":2112"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-manager
  namespace: bin-manager
  labels:
    app: api-manager
spec:
  type: LoadBalancer
  loadBalancerIP: PLACEHOLDER_STATIC_IP_ADDRESS_API_MANAGER
  externalTrafficPolicy: Cluster
  ports:
    - name: https
      port: 443
      targetPort: 443
  selector:
    app: api-manager
  # PR #3a: metrics (2112) and audiosocket (9000) are intentionally
  # omitted from the external LB Service. PR #3b creates an
  # `api-manager-internal` ClusterIP Service for those ports.

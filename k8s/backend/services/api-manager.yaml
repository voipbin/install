apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-manager
  namespace: bin-manager
  labels:
    app: api-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-manager
  template:
    metadata:
      labels:
        app: api-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: api-manager
          image: voipbin/api-manager
          ports:
            - containerPort: 443
              name: api
            - containerPort: 2112
              name: metrics
            - containerPort: 9000
              name: audiosocket
          envFrom:
            - configMapRef:
                name: voipbin-config
            - secretRef:
                name: voipbin-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-manager
  namespace: bin-manager
  labels:
    app: api-manager
spec:
  type: LoadBalancer
  loadBalancerIP: PLACEHOLDER_STATIC_IP_ADDRESS_API_MANAGER
  externalTrafficPolicy: Cluster
  ports:
    - name: https
      port: 443
      targetPort: 443
  selector:
    app: api-manager
  # PR #3a: metrics (2112) and audiosocket (9000) are intentionally
  # omitted from the external LB Service. PR #3b creates an
  # `api-manager-internal` ClusterIP Service for those ports.

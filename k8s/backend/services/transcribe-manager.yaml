apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcribe-manager
  namespace: bin-manager
  labels:
    app: transcribe-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transcribe-manager
  template:
    metadata:
      labels:
        app: transcribe-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: transcribe-manager
          image: voipbin/transcribe-manager
          ports:
            - containerPort: 2112
              name: metrics
          envFrom:
            - configMapRef:
                name: voipbin-config
            - secretRef:
                name: voipbin-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: transcribe-manager
  namespace: bin-manager
  labels:
    app: transcribe-manager
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
  selector:
    app: transcribe-manager

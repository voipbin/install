apiVersion: v1
kind: Service
metadata:
  name: asterisk-call-tcp
  namespace: voip
  labels:
    app: asterisk-call
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: asterisk-call
  externalTrafficPolicy: Local
  ports:
    - port: 5060
      targetPort: 5060
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: asterisk-call-udp
  namespace: voip
  labels:
    app: asterisk-call
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: asterisk-call
  externalTrafficPolicy: Local
  ports:
    - port: 5060
      targetPort: 5060
      protocol: UDP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: square-meet
  namespace: bin-manager
  labels:
    app: square-meet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: square-meet
  template:
    metadata:
      labels:
        app: square-meet
    spec:
      containers:
        - name: square-meet
          image: voipbin/square-meet
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: square-meet
  namespace: bin-manager
  labels:
    app: square-meet
spec:
  type: LoadBalancer
  loadBalancerIP: PLACEHOLDER_STATIC_IP_ADDRESS_MEET
  externalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: square-meet

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: square-manager
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: voipbin/square-admin
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: nginx-tls
          image: nginx:1.27-alpine
          ports:
            - containerPort: 443
              name: https
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: voipbin-tls
        - name: nginx-conf
          configMap:
            name: frontend-tls-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: square-manager
  labels:
    app: admin
spec:
  type: LoadBalancer
  loadBalancerIP: PLACEHOLDER_STATIC_IP_ADDRESS_ADMIN
  externalTrafficPolicy: Cluster
  ports:
    - name: https
      port: 443
      targetPort: 443
  selector:
    app: admin

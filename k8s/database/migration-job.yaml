apiVersion: batch/v1
kind: Job
metadata:
  name: database-migration
  namespace: bin-manager
  labels:
    app: database-migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: database-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: voipbin/bin-database
          env:
            - name: DB_HOST
              value: "cloudsql-proxy.infrastructure.svc.cluster.local"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: voipbin-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voipbin-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: voipbin-config
                  key: DB_NAME
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

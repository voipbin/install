[defaults]
inventory = inventory/gcp_inventory.py
roles_path = ./roles
host_key_checking = False
interpreter_python = /usr/bin/python3
retry_files_enabled = False
stdout_callback = yaml
callbacks_enabled = timer
remote_tmp = /tmp/.ansible-${USER}/tmp
timeout = 60

[ssh_connection]
pipelining = True
# IAP tunnel SSH: ProxyCommand uses gcloud to tunnel through IAP.
# The gcp_project_id and zone are injected per-host by the dynamic inventory.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
become = True
become_method = sudo
become_user = root
